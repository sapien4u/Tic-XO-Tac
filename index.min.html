<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Tic-Tac-Toe</title><style>:root{--bg:#f0f4f8;--surface:#fff;--border:#d1d9e0;--text:#1a1f2e;--muted:#6b7280;--x-color:#e53e3e;--o-color:#3182ce;--win-bg:#fef9c3;--btn-bg:#3b82f6;--btn-hover:#2563eb;--btn-danger:#ef4444;--btn-danger-h:#dc2626;--shadow:0 4px 20px rgba(0,0,0,.08);--cell-size:clamp(80px,25vw,130px);--transition:.18s ease}[data-theme=dark]{--bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--x-color:#fc8181;--o-color:#63b3ed;--win-bg:#312e09;--shadow:0 4px 20px rgba(0,0,0,.4)}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;transition:background var(--transition),color var(--transition)}header{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}header h1{font-size:clamp(1.4rem,4vw,1.9rem);font-weight:800;letter-spacing:-.5px}header h1 span.x{color:var(--x-color)}header h1 span.o{color:var(--o-color)}.header-actions{display:flex;gap:8px}.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--transition),transform .1s;font-size:1.1rem}.icon-btn:hover{background:var(--border)}.icon-btn:active{transform:scale(.93)}.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px 20px;width:100%;max-width:520px;box-shadow:var(--shadow);transition:background var(--transition),border-color var(--transition)}.players{display:flex;gap:12px;margin-bottom:18px}.player-input.hidden{display:none}.player-input{flex:1;display:flex;flex-direction:column;gap:4px}.player-input label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}.player-input label.x-label{color:var(--x-color)}.player-input label.o-label{color:var(--o-color)}.player-input input{padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:.9rem;outline:none;transition:border-color .15s}.player-input input:focus{border-color:var(--btn-bg)}.seg-btn{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden}.seg-btn button{border:none;background:transparent;padding:5px 14px;cursor:pointer;font-size:.85rem;color:var(--muted);transition:background .15s,color .15s}.seg-btn button.active{background:var(--btn-bg);color:#fff;font-weight:700}.options-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}.options-row .opt-left,.options-row .opt-right{display:flex;align-items:center;gap:8px;flex-shrink:0}.options-row .row-label{font-size:.85rem;font-weight:600;color:var(--muted);white-space:nowrap}.ai-config{display:none;flex-direction:column;gap:8px;margin-bottom:18px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:10px}.ai-config.visible{display:flex}.ai-config-row{display:flex;align-items:center;justify-content:space-between;gap:8px}.ai-config-group{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--muted);font-weight:600}.ai-config-group span{white-space:nowrap}.ai-mark-badge{font-size:.78rem;font-weight:800;padding:2px 9px;border-radius:6px;border:1.5px solid currentColor}.ai-mark-badge.x-badge{color:var(--x-color)}.ai-mark-badge.o-badge{color:var(--o-color)}.toggle-wrap{display:flex;align-items:center;gap:6px;font-size:.85rem;font-weight:600;color:var(--text);cursor:pointer;-webkit-user-select:none;user-select:none}.toggle-wrap input[type=checkbox]{display:none}.toggle-track{width:36px;height:20px;background:var(--border);border-radius:99px;position:relative;transition:background .2s}.toggle-wrap input:checked+.toggle-track{background:var(--btn-bg)}.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s}.toggle-wrap input:checked+.toggle-track::after{left:18px}.status{text-align:center;font-size:1rem;font-weight:600;min-height:2em;margin-bottom:18px;line-height:1.4}.status .highlight{display:inline-block;padding:2px 10px;border-radius:6px}.status .x-turn{color:var(--x-color)}.status .o-turn{color:var(--o-color)}.status .winner{background:var(--win-bg)}.status .draw{color:var(--muted)}.scoreboard{display:flex;justify-content:space-between;gap:8px;margin-bottom:22px}.score-cell{flex:1;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 6px;transition:transform .15s}.score-cell.active-score{transform:scale(1.05)}.score-cell .score-label{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}.score-cell .score-value{font-size:1.8rem;font-weight:900;line-height:1}.score-cell.x-score .score-value{color:var(--x-color)}.score-cell.o-score .score-value{color:var(--o-color)}.score-cell.draw-score .score-value{color:var(--muted)}.board-wrap{position:relative;display:flex;justify-content:center;margin-bottom:24px}#confettiCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}.board{display:grid;grid-template-columns:repeat(3,var(--cell-size));grid-template-rows:repeat(3,var(--cell-size));gap:8px;justify-content:center}.cell{background:var(--bg);border:2px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:clamp(2rem,7vw,3.5rem);font-weight:900;line-height:1;transition:background .15s,border-color .15s,transform .1s;position:relative;overflow:hidden;-webkit-user-select:none;user-select:none;min-width:44px;min-height:44px}.cell:hov <header><h1>Tic-<span class="x">X</span><span class="o">O</span>-Tac</h1><div class="header-actions"><button class="icon-btn" id="soundBtn" title="Toggle sound" aria-label="Toggle sound">🔊</button><button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">🌙</button></div></header>
<main class="card"><div class="players"><div class="player-input" id="playerXWrap"><label class="x-label" for="nameX">✕ Player X</label><input id="nameX" type="text" maxlength="16" placeholder="Player X" value="Player X"/></div><div class="player-input" id="playerOWrap"><label class="o-label" for="nameO">○ Player O</label><input id="nameO" type="text" maxlength="16" placeholder="Player O" value="Player O"/></div></div><div class="options-row"><div class="opt-left"><label class="toggle-wrap" title="Enable AI opponent"><input type="checkbox" id="aiToggle"/><span class="toggle-track"></span>AI Opponent</label></div><div class="opt-right" id="whoStartsRow"><span class="row-label">Starts:</span><div class="seg-btn" id="startSeg"><button data-val="X" class="active">X</button><button data-val="O">O</button></div></div></div><div class="ai-config" id="aiConfigRow"><div class="ai-config-row"><div class="ai-config-group"><span>You play:</span><div class="seg-btn" id="humanMarkSeg"><button data-val="X" class="active">X</button><button data-val="O">O</button></div></div><span class="ai-mark-badge" id="aiMarkBadge">AI → O</span><div class="ai-config-group"><span>Goes first:</span><div class="seg-btn" id="goesFirstSeg"><button data-val="human" class="active">You</button><button data-val="ai">AI</button></div></div></div><div class="ai-config-row"><div class="ai-config-group"><span>Difficulty:</span><div class="seg-btn" id="diffSeg"><button data-val="easy">Easy</button><button data-val="medium" class="active">Medium</button><button data-val="hard">Hard</button></div></div></div></div><div class="status" id="status" aria-live="polite">Loading…</div><div class="scoreboard"><div class="score-cell x-score" id="scoreX"><div class="score-label" id="labelX">Player X</div><div class="score-value" id="valX">0</div></div><div class="score-cell draw-score" id="scoreDraw"><div class="score-label">Draws</div><div class="score-value" id="valDraw">0</div></div><div class="score-cell o-score" id="scoreO"><div class="score-label" id="labelO">Player O</div><div class="score-value" id="valO">0</div></div></div><div class="board-wrap"><div class="board" id="board" role="grid" aria-label="Tic-Tac-Toe board"></div><canvas id="confettiCanvas" aria-hidden="true"></canvas></div><div class="btn-row"><button class="btn btn-primary" id="resetBtn">New Game</button><button class="btn btn-danger" id="resetScoresBtn">Reset Scores</button></div><div class="sound-row"><span id="soundLabel" class="sound-label">Sound: ON</span></div></main>
<script>
const WIN_LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const state={board:Array(9).fill(null),current:'X',gameOver:false,firstPlayer:'X',humanChosenMark:'X',aiGoesFirst:false,aiEnabled:false,difficulty:'medium',soundOn:true,theme:'light',score:{X:0,O:0,draw:0},names:{X:'Player X',O:'Player O'}};
const $=id=>document.getElementById(id);
const boardEl=$('board'),statusEl=$('status'),resetBtn=$('resetBtn'),resetScores=$('resetScoresBtn'),themeBtn=$('themeBtn'),soundBtn=$('soundBtn'),soundLabel=$('soundLabel'),aiToggle=$('aiToggle'),diffSeg=$('diffSeg'),aiConfigRow=$('aiConfigRow'),humanMarkSeg=$('humanMarkSeg'),goesFirstSeg=$('goesFirstSeg'),aiMarkBadge=$('aiMarkBadge'),nameXInput=$('nameX'),nameOInput=$('nameO'),playerXWrap=$('playerXWrap'),playerOWrap=$('playerOWrap'),whoStartsRow=$('whoStartsRow'),startSeg=$('startSeg');
let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(freq,dur=0.12,type='sine',vol=0.18){if(!state.soundOn)return;try{const ctx=getAudioCtx(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);gain.gain.setValueAtTime(vol,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);}catch(e){}}
const sounds={placeX:()=>beep(523,.1,'sine'),placeO:()=>beep(392,.1,'sine'),winX:()=>{beep(523,.12,'sine',.2);setTimeout(()=>beep(659,.12,'sine',.2),120);setTimeout(()=>beep(784,.12,'sine',.2),240);setTimeout(()=>beep(1047,.22,'sine',.18),360);},winO:()=>{beep(440,.14,'triangle',.22);setTimeout(()=>beep(523,.14,'triangle',.22),130);setTimeout(()=>beep(659,.14,'triangle',.22),260);setTimeout(()=>beep(880,.24,'triangle',.2),390);},draw:()=>{beep(330,.15,'triangle');setTimeout(()=>beep(294,.2,'triangle'),170);},invalid:()=>beep(180,.08,'square',.1)};
const confettiCanvas=document.getElementById('confettiCanvas'),confettiCtx=confettiCanvas.getContext('2d');let confettiAnim=null;
const CONFETTI_CFG={X:{colors:['#e53e3e','#fc8181','#feb2b2','#c53030','#fff'],shapes:['square','diamond'],count:90},O:{colors:['#3182ce','#63b3ed','#bee3f8','#2b6cb0','#fff'],shapes:['circle','oval'],count:90}};
function launchConfetti(w){if(window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;const cfg=CONFETTI_CFG[w];if(!cfg)return;const rect=confettiCanvas.getBoundingClientRect();confettiCanvas.width=rect.width;confettiCanvas.height=rect.height;const W=confettiCanvas.width,H=confettiCanvas.height;const particles=Array.from({length:cfg.count},()=>{const a=Math.PI*(.3+Math.random()*.4),sp=2.5+Math.random()*4.5;return{x:W*(.2+Math.random()*.6),y:H*(.3+Math.random()*.3),vx:Math.cos(a)*sp*(Math.random()<.5?1:-1),vy:-Math.abs(Math.sin(a)*sp),size:4+Math.random()*6,color:cfg.colors[Math.floor(Math.random()*cfg.colors.length)],shape:cfg.shapes[Math.floor(Math.random()*cfg.shapes.length)],rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.18,life:1,decay:.012+Math.random()*.01};});if(confettiAnim)cancelAnimationFrame(confettiAnim);function dp(p){confettiCtx.save();confettiCtx.globalAlpha=Math.max(0,p.life);confettiCtx.fillStyle=p.color;confettiCtx.translate(p.x,p.y);confettiCtx.rotate(p.rot);const s=p.size;switch(p.shape){case'square':confettiCtx.fillRect(-s/2,-s/2,s,s);break;case'diamond':confettiCtx.beginPath();confettiCtx.moveTo(0,-s);confettiCtx.lineTo(s*.6,0);confettiCtx.lineTo(0,s);confettiCtx.lineTo(-s*.6,0);confettiCtx.closePath();confettiCtx.fill();break;case'circle':confettiCtx.beginPath();confettiCtx.arc(0,0,s/2,0,Math.PI*2);confettiCtx.fill();break;case'oval':confettiCtx.beginPath();confettiCtx.ellipse(0,0,s*.65,s*.35,0,0,Math.PI*2);confettiCtx.fill();break;}confettiCtx.restore();}function frame(){confettiCtx.clearRect(0,0,W,H);let alive=false;for(const p of particles){if(p.life<=0)continue;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.vx*=.995;p.rot+=p.rotV;p.life-=p.decay;dp(p);}if(alive)confettiAnim=requestAnimationFrame(frame);else confettiCtx.clearRect(0,0,W,H);}confettiAnim=requestAnimationFrame(frame);}
function clearConfetti(){if(confettiAnim){cancelAnimationFrame(confettiAnim);confettiAnim=null;}confettiCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);}
function buildBoard(){boardEl.innerHTML='';for(let i=0;i<9;i++){const c=document.createElement('div');c.className='cell';c.dataset.i=i;c.setAttribute('role','gridcell');c.setAttribute('tabindex','0');c.setAttribute('aria-label','Cell '+(i+1));c.addEventListener('click',()=>handleCellClick(i));c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')handleCellClick(i);});boardEl.appendChild(c);}}
function renderBoard(wl=null){const cells=boardEl.querySelectorAll('.cell');cells.forEach((c,i)=>{const v=state.board[i];c.className='cell'+(v?' taken':'')+(v==='X'?' x-cell':'')+(v==='O'?' o-cell':'')+(state.gameOver?' game-over':'');if(wl&&wl.includes(i))c.classList.add('win-cell');if(v&&!c.querySelector('.mark')){c.innerHTML=`<span class="mark">${v==='X'?'✕':'○'}</span>`;}else if(!v){c.innerHTML='';}c.setAttribute('aria-label',v?`Cell ${i+1}: ${v}`:`Cell ${i+1}: empty`);});}
function renderScore(){$('valX').textContent=state.score.X;$('valO').textContent=state.score.O;$('valDraw').textContent=state.score.draw;$('labelX').textContent=state.names.X;$('labelO').textContent=state.names.O;}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderStatus(wl=null){const curr=state.current;['scoreX','scoreO','scoreDraw'].forEach(id=>$(id).classList.remove('active-score'));if(state.gameOver){if(wl){const wm=state.board[wl[0]],wn=state.names[wm];statusEl.innerHTML=`<span class="highlight winner ${wm==='X'?'x-turn':'o-turn'}">🎉 ${escHtml(wn)} wins!</span>`;$(wm==='X'?'scoreX':'scoreO').classList.add('active-score');}else{statusEl.innerHTML=`<span class="highlight draw">It's a draw!</span>`;$('scoreDraw').classList.add('active-score');}}else{statusEl.innerHTML=`<span class="${curr==='X'?'x-turn':'o-turn'}">${escHtml(state.names[curr])}'s turn (${curr})</span>`;}}
function checkWinner(b){for(const l of WIN_LINES){const[a,c,d]=l;if(b[a]&&b[a]===b[c]&&b[a]===b[d])return{winner:b[a],line:l};}return null;}
function isBoardFull(b){return b.every(v=>v!==null);}
function emptyCells(b){return b.reduce((acc,v,i)=>{if(!v)acc.push(i);return acc;},[]);}
function makeMove(i){if(state.gameOver||state.board[i])return false;state.board[i]=state.current;state.current==='X'?sounds.placeX():sounds.placeO();const r=checkWinner(state.board);if(r){state.gameOver=true;state.score[r.winner]++;renderBoard(r.line);renderStatus(r.line);renderScore();r.winner==='X'?sounds.winX():sounds.winO();launchConfetti(r.winner);saveState();return true;}if(isBoardFull(state.board)){state.gameOver=true;state.score.draw++;renderBoard();renderStatus(null);renderScore();sounds.draw();saveState();return true;}state.current=state.current==='X'?'O':'X';renderBoard();renderStatus();saveState();return true;}
function handleCellClick(i){if(state.gameOver){sounds.invalid();return;}if(state.aiEnabled&&state.current===aiMark())return;if(state.board[i]){sounds.invalid();return;}makeMove(i);if(!state.gameOver&&state.aiEnabled&&state.current===aiMark())scheduleAI();}
function aiMark(){return state.humanChosenMark==='X'?'O':'X';}
function humanMark(){return state.humanChosenMark;}
function syncFirstPlayer(){if(!state.aiEnabled)return;state.firstPlayer=state.aiGoesFirst?aiMark():humanMark();}
function scheduleAI(){const d=state.difficulty==='easy'?300:state.difficulty==='medium'?420:550;setTimeout(aiMove,d);}
function aiMove(){if(state.gameOver)return;const ai=aiMark(),human=humanMark();let idx;switch(state.difficulty){case'easy':idx=aiEasy();break;case'medium':idx=aiMedium(ai,human);break;case'hard':idx=aiHard(ai,human);break;default:idx=aiEasy();}if(idx!=null)makeMove(idx);}
function aiEasy(){const e=emptyCells(state.board);return e[Math.floor(Math.random()*e.length)];}
function aiMedium(ai,human){const w=findWinningMove(state.board,ai);if(w!==null)return w;const bl=findWinningMove(state.board,human);if(bl!==null)return bl;if(!state.board[4])return 4;if(Math.random()<.6)return aiHard(ai,human);return aiEasy();}
function aiHard(ai,human){return minimax(state.board,true,ai,human,0).index;}
function findWinningMove(board,mark){for(const i of emptyCells(board)){const c=[...board];c[i]=mark;if(checkWinner(c)?.winner===mark)return i;}return null;}
function minimax(board,isMax,ai,human,depth){const r=checkWinner(board);if(r)return{score:r.winner===ai?10-depth:depth-10};if(isBoardFull(board))return{score:0};const cells=emptyCells(board);let best=isMax?{score:-Infinity,index:cells[0]}:{score:Infinity,index:cells[0]};for(const i of cells){const c=[...board];c[i]=isMax?ai:human;const ch=minimax(c,!isMax,ai,human,depth+1);ch.index=i;if(isMax?ch.score>best.score:ch.score<best.score)best=ch;}return best;}
function newGame(){clearConfetti();state.board=Array(9).fill(null);state.gameOver=false;state.current=state.firstPlayer;renderBoard();renderStatus();renderScore();if(state.aiEnabled&&state.current===aiMark())scheduleAI();saveState();}
themeBtn.addEventListener('click',()=>{state.theme=state.theme==='light'?'dark':'light';document.documentElement.dataset.theme=state.theme;themeBtn.textContent=state.theme==='dark'?'☀️':'🌙';saveState();});
soundBtn.addEventListener('click',()=>{state.soundOn=!state.soundOn;soundBtn.textContent=state.soundOn?'🔊':'🔇';soundLabel.textContent=`Sound: ${state.soundOn?'ON':'OFF'}`;saveState();});
resetBtn.addEventListener('click',newGame);
resetScores.addEventListener('click',()=>{state.score={X:0,O:0,draw:0};renderScore();saveState();});
nameXInput.addEventListener('input',()=>{state.names.X=nameXInput.value.trim()||'Player X';renderScore();renderStatus();saveState();});
nameOInput.addEventListener('input',()=>{state.names.O=nameOInput.value.trim()||'Player O';renderScore();renderStatus();saveState();});
startSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{startSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.firstPlayer=btn.dataset.val;newGame();});});
aiToggle.addEventListener('change',()=>{state.aiEnabled=aiToggle.checked;syncFirstPlayer();updateAiControls();newGame();saveState();});
humanMarkSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{humanMarkSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.humanChosenMark=btn.dataset.val;syncFirstPlayer();updateAiControls();newGame();saveState();});});
goesFirstSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{goesFirstSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.aiGoesFirst=btn.dataset.val==='ai';syncFirstPlayer();updateAiControls();newGame();saveState();});});
diffSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{diffSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.difficulty=btn.dataset.val;newGame();saveState();});});
function updateAiControls(){const on=state.aiEnabled;aiConfigRow.classList.toggle('visible',on);whoStartsRow.style.display=on?'none':'';if(on){const aiM=aiMark();playerXWrap.classList.toggle('hidden',aiM==='X');playerOWrap.classList.toggle('hidden',aiM==='O');aiMarkBadge.textContent=`AI \u2192 ${aiM}`;aiMarkBadge.className=`ai-mark-badge ${aiM==='X'?'x-badge':'o-badge'}`;humanMarkSeg.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.val===state.humanChosenMark));goesFirstSeg.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.val===(state.aiGoesFirst?'ai':'human')));diffSeg.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.val===state.difficulty));}else{playerXWrap.classList.remove('hidden');playerOWrap.classList.remove('hidden');}}
const STORAGE_KEY='tictactoe_state_v1';
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({score:state.score,names:state.names,firstPlayer:state.firstPlayer,humanChosenMark:state.humanChosenMark,aiEnabled:state.aiEnabled,aiGoesFirst:state.aiGoesFirst,difficulty:state.difficulty,soundOn:state.soundOn,theme:state.theme}));}catch(e){}}
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const s=JSON.parse(raw);if(s.score)state.score=s.score;if(s.names)state.names=s.names;if(s.firstPlayer)state.firstPlayer=s.firstPlayer;if(s.humanChosenMark)state.humanChosenMark=s.humanChosenMark;if(typeof s.aiEnabled==='boolean')state.aiEnabled=s.aiEnabled;if(typeof s.aiGoesFirst==='boolean')state.aiGoesFirst=s.aiGoesFirst;if(s.difficulty)state.difficulty=s.difficulty;if(typeof s.soundOn==='boolean')state.soundOn=s.soundOn;if(s.theme)state.theme=s.theme;}catch(e){}}
function init(){loadState();document.documentElement.dataset.theme=state.theme;themeBtn.textContent=state.theme==='dark'?'☀️':'🌙';soundBtn.textContent=state.soundOn?'🔊':'🔇';soundLabel.textContent=`Sound: ${state.soundOn?'ON':'OFF'}`;nameXInput.value=state.names.X;nameOInput.value=state.names.O;startSeg.querySelectorAll('button').forEach(btn=>btn.classList.toggle('active',btn.dataset.val===state.firstPlayer));aiToggle.checked=state.aiEnabled;syncFirstPlayer();updateAiControls();buildBoard();newGame();}
init();
</script></body></html>
