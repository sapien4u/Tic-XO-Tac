let audioCtx=null;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function beep(freq,dur=0.12,type='sine',vol=0.18){if(!state.soundOn)return;try{const ctx=getAudioCtx(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);gain.gain.setValueAtTime(vol,ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+dur);}catch(e){}}
const sounds={placeX:()=>beep(523,0.10,'sine'),placeO:()=>beep(392,0.10,'sine'),winX:()=>{beep(523,0.12,'sine',0.20);setTimeout(()=>beep(659,0.12,'sine',0.20),120);setTimeout(()=>beep(784,0.12,'sine',0.20),240);setTimeout(()=>beep(1047,0.22,'sine',0.18),360);},winO:()=>{beep(440,0.14,'triangle',0.22);setTimeout(()=>beep(523,0.14,'triangle',0.22),130);setTimeout(()=>beep(659,0.14,'triangle',0.22),260);setTimeout(()=>beep(880,0.24,'triangle',0.20),390);},draw:()=>{beep(392,0.14,'sawtooth',0.12);setTimeout(()=>beep(330,0.14,'sawtooth',0.12),140);setTimeout(()=>beep(294,0.14,'sawtooth',0.12),280);setTimeout(()=>beep(261,0.14,'sawtooth',0.12),420);setTimeout(()=>beep(247,0.28,'sawtooth',0.10),560);},invalid:()=>beep(180,0.08,'square',0.1)};

const CONFETTI_CFG={X:{colors:['#e53e3e','#fc8181','#feb2b2','#c53030','#fff'],shapes:['square','diamond'],count:90},O:{colors:['#3182ce','#63b3ed','#bee3f8','#2b6cb0','#fff'],shapes:['circle','oval'],count:90}};
function launchConfetti(winner){if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;const cfg=CONFETTI_CFG[winner];if(!cfg)return;const rect=confettiCanvas.getBoundingClientRect();confettiCanvas.width=rect.width;confettiCanvas.height=rect.height;const W=confettiCanvas.width,H=confettiCanvas.height;const particles=Array.from({length:cfg.count},()=>{const angle=Math.PI*(0.3+Math.random()*0.4),speed=2.5+Math.random()*4.5;return{x:W*(0.2+Math.random()*0.6),y:H*(0.3+Math.random()*0.3),vx:Math.cos(angle)*speed*(Math.random()<0.5?1:-1),vy:-Math.abs(Math.sin(angle)*speed),size:4+Math.random()*6,color:cfg.colors[Math.floor(Math.random()*cfg.colors.length)],shape:cfg.shapes[Math.floor(Math.random()*cfg.shapes.length)],rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.18,life:1.0,decay:0.012+Math.random()*0.010};});if(confettiAnim)cancelAnimationFrame(confettiAnim);function drawP(p){confettiCtx.save();confettiCtx.globalAlpha=Math.max(0,p.life);confettiCtx.fillStyle=p.color;confettiCtx.translate(p.x,p.y);confettiCtx.rotate(p.rot);const s=p.size;switch(p.shape){case'square':confettiCtx.fillRect(-s/2,-s/2,s,s);break;case'diamond':confettiCtx.beginPath();confettiCtx.moveTo(0,-s);confettiCtx.lineTo(s*0.6,0);confettiCtx.lineTo(0,s);confettiCtx.lineTo(-s*0.6,0);confettiCtx.closePath();confettiCtx.fill();break;case'circle':confettiCtx.beginPath();confettiCtx.arc(0,0,s/2,0,Math.PI*2);confettiCtx.fill();break;case'oval':confettiCtx.beginPath();confettiCtx.ellipse(0,0,s*0.65,s*0.35,0,0,Math.PI*2);confettiCtx.fill();break;}confettiCtx.restore();}function frame(){confettiCtx.clearRect(0,0,W,H);let alive=false;for(const p of particles){if(p.life<=0)continue;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.vx*=0.995;p.rot+=p.rotV;p.life-=p.decay;drawP(p);}if(alive)confettiAnim=requestAnimationFrame(frame);else confettiCtx.clearRect(0,0,W,H);}confettiAnim=requestAnimationFrame(frame);}

function checkWinner(board){for(const line of WIN_LINES){const[a,b,c]=line;if(board[a]&&board[a]===board[b]&&board[a]===board[c])return{winner:board[a],line};}return null;}
function isBoardFull(board){return board.every(v=>v!==null);}
function emptyCells(board){return board.reduce((acc,v,i)=>{if(!v)acc.push(i);return acc;},[]);}
function makeMove(i){if(state.gameOver||state.board[i])return false;state.board[i]=state.current;state.history.push({cell:i,mark:state.current,board:[...state.board]});state.current==='X'?sounds.placeX():sounds.placeO();const result=checkWinner(state.board);if(result){state.gameOver=true;state.lastWinLine=result.line;state.score[result.winner]++;renderBoard(result.line);renderStatus(result.line);renderScore();result.winner==='X'?sounds.winX():sounds.winO();launchConfetti(result.winner);replayBtn.style.display='';saveState();return true;}if(isBoardFull(state.board)){state.gameOver=true;state.lastWinLine=null;state.score.draw++;renderBoard();renderStatus(null);renderScore();sounds.draw();boardEl.querySelectorAll('.cell').forEach(c=>c.classList.add('draw-cell'));boardEl.classList.add('board-shake');boardEl.addEventListener('animationend',()=>boardEl.classList.remove('board-shake'),{once:true});replayBtn.style.display='';saveState();return true;}state.current=state.current==='X'?'O':'X';renderBoard();renderStatus();saveState();return true;}
function handleCellClick(i){if(state.gameOver){sounds.invalid();return;}if(state.aiEnabled&&state.current===aiMark())return;if(state.board[i]){sounds.invalid();return;}makeMove(i);if(!state.gameOver&&state.aiEnabled&&state.current===aiMark())scheduleAI();}
function aiMark(){return state.humanChosenMark==='X'?'O':'X';}
function humanMark(){return state.humanChosenMark;}
function syncFirstPlayer(){if(!state.aiEnabled)return;state.firstPlayer=state.aiGoesFirst?aiMark():humanMark();}
function scheduleAI(){const delay=state.difficulty==='easy'?300:state.difficulty==='medium'?420:550;setTimeout(aiMove,delay);}
function aiMove(){if(state.gameOver)return;const ai=aiMark(),human=humanMark();let idx;switch(state.difficulty){case'easy':idx=aiEasy();break;case'medium':idx=aiMedium(ai,human);break;case'hard':idx=aiHard(ai,human);break;default:idx=aiEasy();}if(idx!==undefined&&idx!==null)makeMove(idx);}
function aiEasy(){const empty=emptyCells(state.board);return empty[Math.floor(Math.random()*empty.length)];}
function findWinningMove(board,mark){for(const i of emptyCells(board)){const copy=[...board];copy[i]=mark;if(checkWinner(copy)?.winner===mark)return i;}return null;}
function aiMedium(ai,human){const win=findWinningMove(state.board,ai);if(win!==null)return win;const block=findWinningMove(state.board,human);if(block!==null)return block;if(!state.board[4])return 4;if(Math.random()<0.6)return aiHard(ai,human);return aiEasy();}
function aiHard(ai,human){return minimax(state.board,true,ai,human,0).index;}
function minimax(board,isMax,ai,human,depth){const result=checkWinner(board);if(result)return{score:result.winner===ai?10-depth:depth-10};if(isBoardFull(board))return{score:0};const cells=emptyCells(board);let best=isMax?{score:-Infinity,index:cells[0]}:{score:Infinity,index:cells[0]};for(const i of cells){const copy=[...board];copy[i]=isMax?ai:human;const child=minimax(copy,!isMax,ai,human,depth+1);child.index=i;if(isMax?child.score>best.score:child.score<best.score)best=child;}return best;}
function newGame(){clearConfetti();closeReplay();state.board=Array(9).fill(null);state.gameOver=false;state.current=state.firstPlayer;state.history=[];state.lastWinLine=null;replayBtn.style.display='none';renderBoard();renderStatus();renderScore();if(state.aiEnabled&&state.current===aiMark())scheduleAI();saveState();}
themeBtn.addEventListener('click',()=>{state.theme=state.theme==='light'?'dark':'light';document.documentElement.dataset.theme=state.theme;themeBtn.textContent=state.theme==='dark'?'☀️':'🌙';saveState();});
soundBtn.addEventListener('click',()=>{state.soundOn=!state.soundOn;soundBtn.textContent=state.soundOn?'🔊':'🔇';soundLabel.textContent=`Sound: ${state.soundOn?'ON':'OFF'}`;saveState();});
resetBtn.addEventListener('click',newGame);
resetScores.addEventListener('click',()=>{state.score={X:0,O:0,draw:0};renderScore();saveState();});
nameXInput.addEventListener('input',()=>{state.names.X=nameXInput.value.trim()||'Player X';renderScore();renderStatus();saveState();});
nameOInput.addEventListener('input',()=>{state.names.O=nameOInput.value.trim()||'Player O';renderScore();renderStatus();saveState();});
startSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{startSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.firstPlayer=btn.dataset.val;newGame();});});
aiToggle.addEventListener('change',()=>{state.aiEnabled=aiToggle.checked;syncFirstPlayer();updateAiControls();newGame();saveState();});
humanMarkSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{humanMarkSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.humanChosenMark=btn.dataset.val;syncFirstPlayer();updateAiControls();newGame();saveState();});});
goesFirstSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{goesFirstSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.aiGoesFirst=btn.dataset.val==='ai';syncFirstPlayer();updateAiControls();newGame();saveState();});});
diffSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{diffSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');state.difficulty=btn.dataset.val;newGame();saveState();});});
function updateAiControls(){const on=state.aiEnabled;aiConfigRow.classList.toggle('visible',on);whoStartsRow.style.display=on?'none':'';if(on){const aiM=aiMark();playerXWrap.classList.toggle('hidden',aiM==='X');playerOWrap.classList.toggle('hidden',aiM==='O');aiMarkBadge.textContent=`AI \u2192 ${aiM}`;aiMarkBadge.className=`ai-mark-badge ${aiM==='X'?'x-badge':'o-badge'}`;humanMarkSeg.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.val===state.humanChosenMark));goesFirstSeg.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.val===(state.aiGoesFirst?'ai':'human')));diffSeg.querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.val===state.difficulty));}else{playerXWrap.classList.remove('hidden');playerOWrap.classList.remove('hidden');}}
const replay={active:false,step:0,intervalMs:1200,timer:null};
function replayStepTo(step){replay.step=Math.max(0,Math.min(step,state.history.length));const total=state.history.length,isLast=replay.step===total;const snap=Array(9).fill(null);for(let m=0;m<replay.step;m++)snap[state.history[m].cell]=state.history[m].mark;const winLine=isLast?state.lastWinLine:null;const cells=boardEl.querySelectorAll('.cell');cells.forEach((cell,i)=>{const val=snap[i];cell.className='cell taken game-over'+(val==='X'?' x-cell':'')+(val==='O'?' o-cell':'');if(winLine&&winLine.includes(i))cell.classList.add('win-cell');if(val&&!cell.querySelector('.mark')){cell.innerHTML=`<span class="mark">${val==='X'?'✕':'○'}</span>`;}else if(!val){cell.innerHTML='';}});if(replay.step===0){statusEl.innerHTML=`<span class="x-turn">Replay — empty board</span>`;}else if(isLast){renderStatus(winLine);}else{const{mark}=state.history[replay.step-1],name=state.names[mark];statusEl.innerHTML=`<span class="${mark==='X'?'x-turn':'o-turn'}">Move ${replay.step}: ${escHtml(name)} played ${mark}</span>`;}replayScrubber.max=total;replayScrubber.value=replay.step;replayStepInfo.textContent=`Move ${replay.step} / ${total}`;replayPrevBtn.disabled=replay.step===0;replayNextBtn.disabled=replay.step===total;replayPlayBtn.textContent=replay.timer?'⏸ Pause':'▶ Play';}
function replayPlay(){if(replay.timer){clearInterval(replay.timer);replay.timer=null;replayPlayBtn.textContent='▶ Play';return;}if(replay.step>=state.history.length)replayStepTo(0);replay.timer=setInterval(()=>{if(replay.step<state.history.length){replayStepTo(replay.step+1);}else{clearInterval(replay.timer);replay.timer=null;replayPlayBtn.textContent='▶ Play';}},replay.intervalMs);replayPlayBtn.textContent='⏸ Pause';}
function openReplay(){if(!state.history.length)return;replay.active=true;replayBar.classList.add('visible');replayBtn.textContent='⏹ Stop';replayStepTo(0);replayPlay();}
function closeReplay(){if(replay.timer){clearInterval(replay.timer);replay.timer=null;}replay.active=false;replay.step=0;replayBar.classList.remove('visible');if(replayBtn.style.display!=='none')replayBtn.textContent='⏮ Replay';if(state.gameOver){renderBoard(state.lastWinLine);renderStatus(state.lastWinLine);}}
replayBtn.addEventListener('click',()=>{if(replay.active)closeReplay();else openReplay();});
replayPrevBtn.addEventListener('click',()=>{if(replay.timer){clearInterval(replay.timer);replay.timer=null;}replayStepTo(replay.step-1);replayPlayBtn.textContent='▶ Play';});
replayNextBtn.addEventListener('click',()=>{if(replay.timer){clearInterval(replay.timer);replay.timer=null;}replayStepTo(replay.step+1);replayPlayBtn.textContent='▶ Play';});
replayScrubber.addEventListener('input',()=>{if(replay.timer){clearInterval(replay.timer);replay.timer=null;}replayStepTo(parseInt(replayScrubber.value,10));replayPlayBtn.textContent='▶ Play';});
replayPlayBtn.addEventListener('click',replayPlay);
replayCloseBtn.addEventListener('click',closeReplay);
replaySpeedSeg.querySelectorAll('button').forEach(btn=>{btn.addEventListener('click',()=>{replaySpeedSeg.querySelectorAll('button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');replay.intervalMs=parseInt(btn.dataset.ms,10);if(replay.timer){clearInterval(replay.timer);replay.timer=null;replayPlay();}});});
const STORAGE_KEY='tictactoe_state_v1';
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({score:state.score,names:state.names,firstPlayer:state.firstPlayer,humanChosenMark:state.humanChosenMark,aiEnabled:state.aiEnabled,aiGoesFirst:state.aiGoesFirst,difficulty:state.difficulty,soundOn:state.soundOn,theme:state.theme}));}catch(e){}}
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;const saved=JSON.parse(raw);if(saved.score)state.score=saved.score;if(saved.names)state.names=saved.names;if(saved.firstPlayer)state.firstPlayer=saved.firstPlayer;if(saved.humanChosenMark)state.humanChosenMark=saved.humanChosenMark;if(typeof saved.aiEnabled==='boolean')state.aiEnabled=saved.aiEnabled;if(typeof saved.aiGoesFirst==='boolean')state.aiGoesFirst=saved.aiGoesFirst;if(saved.difficulty)state.difficulty=saved.difficulty;if(typeof saved.soundOn==='boolean')state.soundOn=saved.soundOn;if(saved.theme)state.theme=saved.theme;}catch(e){}}
function init(){loadState();document.documentElement.dataset.theme=state.theme;themeBtn.textContent=state.theme==='dark'?'☀️':'🌙';soundBtn.textContent=state.soundOn?'🔊':'🔇';soundLabel.textContent=`Sound: ${state.soundOn?'ON':'OFF'}`;nameXInput.value=state.names.X;nameOInput.value=state.names.O;startSeg.querySelectorAll('button').forEach(btn=>{btn.classList.toggle('active',btn.dataset.val===state.firstPlayer);});aiToggle.checked=state.aiEnabled;syncFirstPlayer();updateAiControls();buildBoard();newGame();}
let deferredInstallPrompt=null;
const installBtn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredInstallPrompt=e;installBtn.hidden=false;});
installBtn.addEventListener('click',async()=>{if(!deferredInstallPrompt)return;deferredInstallPrompt.prompt();const{outcome}=await deferredInstallPrompt.userChoice;if(outcome==='accepted')installBtn.hidden=true;deferredInstallPrompt=null;});
window.addEventListener('appinstalled',()=>{installBtn.hidden=true;deferredInstallPrompt=null;});
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(reg=>console.log('[SW] Registered, scope:',reg.scope)).catch(err=>console.warn('[SW] Registration failed:',err));});}
init();
</script>
